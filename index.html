<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish STR</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    color: white;
    overflow-y: auto;
  }

  /* SIDE IMAGES */
  .left, .right {
    flex: 1;
    background: url('https://i.imgur.com/PbjULjs.jpg') no-repeat center center/cover;
  }

  /* CENTER SECTION */
  .center {
    width: 420px;
    min-height: 100vh;
    background: #022c22;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .form-box {
    width: 100%;
    text-align: center;
  }

  /* LOGO */
  .logo {
    width: 120px;
    margin-bottom: 15px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 8px;
  }

  p {
    margin-bottom: 25px;
    color: #a7f3d0;
  }

  input, textarea, select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
  }

  input::placeholder,
  textarea::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    width: 100%;
    padding: 14px;
    background: #10b981;
    border: none;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #059669;
  }

  /* MOBILE */
  @media (max-width: 900px) {
    .left, .right {
      display: none;
    }

    .center {
      width: 100%;
    }
  }
</style>
</head>

<body>

<div class="left"></div>

<div class="center">
  <div class="form-box">

    <!-- YOUR LOGO -->
    <img src="https://i.imgur.com/2qkdwmb.png" class="logo" alt="Wish STR Logo">

    <h1>Wish STR</h1>
    <p>Exclusive STR deals & investor network</p>

    <!-- YOUR FORM -->
    <form action="https://formspree.io/f/mpqygqwo" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>

      <input type="email" name="email" placeholder="Email Address" required>

      <input type="tel" name="phone" placeholder="Phone Number">

      <select name="experience">
        <option value="">Experience Level</option>
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
      </select>

      <select name="budget">
        <option value="">Investment Budget</option>
        <option>$50K - $100K</option>
        <option>$100K - $250K</option>
        <option>$250K+</option>
      </select>

      <textarea name="message" placeholder="What are you looking for?"></textarea>

      <button type="submit">Get Early Access</button>

    </form>

  </div>
</div>

<div class="right"></div>

</body>
</html>
