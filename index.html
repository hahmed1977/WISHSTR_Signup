<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wish STR</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
    }

    .side {
      flex: 1;
      background-image: url('https://i.imgur.com/PbjULjs.jpeg');
      background-size: cover;
      background-position: center;
    }

    .center {
      width: 420px;
      background: #062f24;
      color: white;
      padding: 50px 25px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo img {
      width: 260px;
      margin: 0 auto 20px;
      display: block;
    }

    h1 {
      text-align: center;
      margin: 5px 0;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 25px;
      color: #b8d6cc;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      background: #0f4434;
      color: white;
    }

    button {
      padding: 14px;
      border: none;
      background: #1dbf73;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .note {
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
      color: #cfe7df;
    }

    @media(max-width: 900px) {
      .side { display: none; }
      .center { width: 100%; }
    }
  </style>
</head>

<body>

<div class="side"></div>

<div class="center">

  <div class="logo">
    <img src="https://i.imgur.com/2qkdwmb.png">
  </div>

  <h1>Wish STR</h1>
  <p class="subtitle">Private Investor Network</p>

  <!-- IMPORTANT: NO action redirect -->
  <form id="form">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <select name="experience" required>
      <option value="">Experience Level</option>
      <option>Beginner</option>
      <option>Intermediate</option>
      <option>Advanced</option>
    </select>

    <select name="budget" required>
      <option value="">Investment Budget</option>
      <option>$50K - $100K</option>
      <option>$100K - $250K</option>
      <option>$250K+</option>
    </select>

    <textarea name="message" placeholder="What are you looking for?" required></textarea>

    <button type="submit">Apply for Access</button>

    <div class="note">
      <strong>Private Investor Network</strong><br>
      We do NOT accept everyone. Applications are reviewed.<br>
      You may receive a call or text if approved.
    </div>

  </form>

</div>

<div class="side"></div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault(); // THIS STOPS FORMSPREE PAGE

  const data = new FormData(this);

  await fetch("https://formspree.io/f/mpqygqwo", {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  // FORCE redirect
  window.location.href = "https://wishstr-signup.com/thank-you.html";
});
</script>

</body>
</html>
