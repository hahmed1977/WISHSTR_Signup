<!DOCTYPE html>
<html>
<head>
  <title>Wish STR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    .side {
      flex: 1;
      background-image: url('https://i.imgur.com/PbjULjs.jpeg');
      background-size: cover;
      background-position: center;
    }

    .center {
      width: 400px;
      background: #0b3d2e;
      color: white;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 120px;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
    }

    p.subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      color: #cce5dd;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
      background: #174d3c;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background: #1dbf73;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      font-size: 13px;
      margin-top: 15px;
      text-align: center;
      line-height: 1.5;
      color: #d0e6df;
    }

    @media(max-width: 900px) {
      .side {
        display: none;
      }
      .center {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="side"></div>

  <div class="center">

    <!-- LOGO -->
    <div class="logo">
      <img src="https://i.imgur.com/2qkdwmb.png">
    </div>

    <h1>Wish STR</h1>
    <p class="subtitle">Private Investor Network</p>

    <form action="https://formspree.io/f/mpqygqwo" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>

      <input type="email" name="email" placeholder="Email Address" required>

      <input type="tel" name="phone" placeholder="Phone Number">

      <select name="experience">
        <option value="">Experience Level</option>
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
      </select>

      <select name="budget">
        <option value="">Investment Budget</option>
        <option>$500K - 1M</option>
        <option>1M - 1.5M</option>
        <option>1.5M+</option>
      </select>

      <textarea name="message" placeholder="What are you looking for?"></textarea>

      <button type="submit">Apply for Access</button>

      <!-- YOUR MESSAGE -->
      <div class="note">
        <strong>Private Investor Network</strong><br>
        We do NOT accept everyone. Applications are carefully reviewed.<br><br>
        We review your profile.<br>
        You may receive a call or text.<br>
        If approved, you get access.
      </div>

    </form>

  </div>

  <div class="side"></div>

</body>
</html>
