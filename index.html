<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish STR</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    color: white;
  }

  /* LEFT IMAGE */
  .left {
    flex: 1;
    background: url('https://i.imgur.com/PbjULjs.jpg') no-repeat center center/cover;
  }

  /* RIGHT IMAGE */
  .right {
    flex: 1;
    background: url('https://i.imgur.com/PbjULjs.jpg') no-repeat center center/cover;
  }

  /* CENTER CONTENT */
  .center {
    width: 450px;
    background: #021e16;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .form-box {
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: 36px;
    margin-bottom: 10px;
  }

  p {
    margin-bottom: 20px;
    color: #a7f3d0;
  }

  input, textarea {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
  }

  input::placeholder,
  textarea::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    width: 100%;
    padding: 14px;
    background: #10b981;
    border: none;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #059669;
  }

  /* MOBILE */
  @media (max-width: 900px) {
    .left, .right {
      display: none;
    }

    .center {
      width: 100%;
      height: 100vh;
    }
  }
</style>
</head>

<body>

<div class="left"></div>

<div class="center">
  <div class="form-box">
    <h1>Wish STR</h1>
    <p>Exclusive STR deals & investor network</p>

    <form action="https://formspree.io/f/yourID" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" placeholder="What are you looking for?"></textarea>
      <button type="submit">Get Early Access</button>
    </form>
  </div>
</div>

<div class="right"></div>

</body>
</html>
