<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wish STR Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  width: 100%;
  max-width: 600px;
  border-radius: 10px;
}

h1 {
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #555;
}

.process {
  background: #f8f8f8;
  padding: 20px;
  border-radius: 10px;
  margin: 20px 0;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  min-height: 100px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 25px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #15803d;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://i.imgur.com/2qkdwmb.png" alt="Wish STR Logo">
  </div>

  <h1>Join Wish STR Community</h1>

  <p class="subtitle">
    <strong>Private Investor Network</strong><br>
    We do NOT accept everyone. Applications are carefully reviewed.
  </p>

  <div class="process">
    <h3>How It Works</h3>
    <ol>
      <li>Submit your application below</li>
      <li>Our team reviews your profile</li>
      <li>You will receive a call or text from WISH STR</li>
      <li>If approved, you will get access</li>
    </ol>
  </div>

  <!-- FORM -->
  <form id="myForm" action="https://formspree.io/f/mpqygqwo" method="POST">

    <input type="hidden" name="_subject" value="New Wish STR Application">

    <label>Full Name</label>
    <input type="text" name="full_name" required>

    <label>Profile Name</label>
    <input type="text" name="profile_name" required>

    <label>Email Address</label>
    <input type="email" name="email" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" required>

    <label>Interested In</label>
    <select name="interest" required>
      <option value="">Select one</option>
      <option>Buying Property</option>
      <option>Buying Business</option>
      <option>Both</option>
    </select>

    <label>Primary Goal</label>
    <select name="goal" required>
      <option value="">Select one</option>
      <option>Tax Benefits</option>
      <option>Passive Income</option>
      <option>Both</option>
    </select>

    <label>Why do you want to join?</label>
    <textarea name="reason" required></textarea>

    <button type="submit">Apply Now</button>

  </form>

</div>

<!-- 🔥 FORCE REDIRECT SCRIPT -->
<script>
document.getElementById("myForm").addEventListener("submit", function() {
  setTimeout(function() {
    window.location.href = "https://hahmed1977.github.io/WISHSTR_Signup/thank-you.html";
  }, 500);
});
</script>

</body>
</html>
